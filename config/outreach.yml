# Outreach Pipeline Configuration
# Nexus-HeadHunter path (absolute)
nexus_path: "/home/13843K/Desktop/mygitprojects/Nexus-HeadHunter"

schedule:
  interval_days: 3
  max_leads_per_run: 15

search:
  # Auto-generated from profile.yml if empty. Add manual overrides here.
  queries: []
  title_filter:
    - CTO
    - CEO
    - Founder
    - "Head of Engineering"
    - "VP Engineering"
  exclude_companies: []

linkedin:
  chrome_data: "./outreach-chrome"
  max_sends_per_day: 10
  delay_between_sends: [30, 90]

email:
  sender_email: ""          # defaults to profile.yml candidate.email if empty
  app_password: ""          # Gmail App Password — prefer GMAIL_APP_PASSWORD env var instead
  max_sends_per_day: 15
  delay_between_sends: [180, 480]   # 3-8 minutes in seconds
  smtp_host: "smtp.gmail.com"
  smtp_port: 465
  verify_timeout_ms: 5000          # SMTP verification timeout per address
  max_verifications_per_second: 2
